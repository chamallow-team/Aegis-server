[workspace]
members = [
    "modules/buildings",
    "modules/database",
    "modules/diplomacy",
    "modules/map",
    "modules/market",
    "modules/resources",
    "modules/technology_tree",
    "modules/units",
    "modules/weapons",
    "utils/auth",
    "utils/logs",
    "utils/save",
    "server",
    "modules/map_renderer",
    "editor",
    "editor/aegis-editor"
]
resolver = "1"

